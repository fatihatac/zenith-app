<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZENITH</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "secondary-fixed-dim": "#c8c6c5",
                        "on-tertiary-container": "#636565",
                        "on-tertiary": "#2f3131",
                        "surface-container-highest": "#353535",
                        "secondary-container": "#474746",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-surface-variant": "#c4c7c8",
                        "primary-container": "#e2e2e2",
                        "secondary-fixed": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-fixed-variant": "#474746",
                        "inverse-surface": "#e2e2e2",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#454747",
                        "surface-dim": "#131313",
                        "primary": "#ffffff",
                        "background": "#131313",
                        "surface-container": "#1f1f1f",
                        "on-secondary-container": "#b7b5b4",
                        "on-secondary": "#313030",
                        "surface-bright": "#393939",
                        "outline-variant": "#444748",
                        "outline": "#8e9192",
                        "inverse-on-surface": "#303030",
                        "error-container": "#93000a",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    },
                    "spacing": {

                        "lg": "40px",
                        "sm": "16px",
                        "margin-mobile": "24px",

                        "unit": "4px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],

                        "display-lg": ["Inter"],
                        "title-sm": ["Inter"]
                    },
                    "fontSize": {

                }

<style>
        body { background-color: theme('colors.background'); color: theme('colors.on-background'); }
        /* Tonal Levels */
        .level-1 { background-color: #1A1A1A; border: 1px solid rgba(255, 255, 255, 0.05); }
        .level-2 { background-color: rgba(28, 28, 30, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glass-nav { background-color: rgba(19, 19, 19, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-body-md antialiased min-h-screen flex flex-col bg-background">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex justify-between items-center px-margin-mobile h-16 w-full z-50 glass-nav border-b border-white/5">
<button aria-label="Menu" class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-display-lg text-[24px] font-semibold tracking-tighter text-primary">ZENITH</h1>
<button aria-label="Search" class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 p-2 -mr-2">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-margin-mobile flex flex-col gap-lg overflow-y-auto">
<!-- Focus Tab (Default) -->
<div class="flex flex-col gap-lg animate-fade-in" id="tab-focus">
<!-- Deep Work Session Widget -->
<div class="level-1 rounded-xl p-8 flex flex-col items-center justify-center gap-6 min-h-[300px]">
<div class="text-on-surface-variant font-label-caps text-label-caps uppercase tracking-widest">Deep Work Session</div>
<div class="font-display-lg text-[64px] text-primary tabular-nums tracking-tighter">25:00</div>
<button class="bg-primary text-on-primary font-title-sm text-title-sm px-8 py-3 rounded-full hover:opacity-90 active:scale-95 transition-all">
                    START
                </button>
</div>
<!-- System Log -->
<div class="flex flex-col gap-sm">
<h2 class="font-title-sm text-title-sm text-primary mb-2">System Log</h2>
<div class="flex items-center gap-4 py-3 border-b border-white/5 last:border-0">
<span class="material-symbols-outlined text-on-surface-variant text-sm">cloud_done</span>
<div class="flex-grow">
<div class="text-primary">Backup Completed</div>
<div class="text-on-surface-variant text-sm">System vault encrypted and synced.</div>
</div>
<div class="text-on-surface-variant text-xs">10m ago</div>
</div>
<div class="flex items-center gap-4 py-3 border-b border-white/5 last:border-0">
<span class="material-symbols-outlined text-on-surface-variant text-sm">verified_user</span>
<div class="flex-grow">
<div class="text-primary">New Device Authorized</div>
<div class="text-on-surface-variant text-sm">MacBook Pro (14-inch, 2023) added to trusted keys.</div>
</div>
<div class="text-on-surface-variant text-xs">2h ago</div>
</div>
</div>
</div>
</main>
<!-- Floating Action Area -->
<div class="fixed bottom-24 right-margin-mobile z-40 flex items-center gap-3">
<button class="bg-primary text-on-primary rounded-full px-5 py-3 flex items-center gap-2 shadow-lg hover:opacity-90 active:scale-95 transition-all border border-transparent">
<span class="material-symbols-outlined text-sm">terminal</span>
<span class="font-title-sm text-sm font-medium">Command</span>
</button>
<button class="bg-surface-container-high text-primary rounded-full w-12 h-12 flex items-center justify-center border border-white/10 hover:bg-surface-container-highest active:scale-95 transition-all">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-4 left-0 right-0 mx-auto w-[92%] max-w-[400px] flex justify-around items-center px-6 py-3 z-50 bg-surface-container border border-white/10 rounded-full shadow-2xl md:hidden">
<!-- Active -->
<button aria-label="home" class="flex flex-col items-center justify-center text-primary bg-white/10 rounded-full p-3 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<!-- Inactive -->
<button aria-label="explore" class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
</button>
<!-- Inactive -->
<button aria-label="notifications" class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<!-- Inactive -->
<button aria-label="person" class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</nav>
<!-- Desktop Sidebar Placeholder (Hidden on mobile per rules) -->
<aside class="hidden md:flex fixed left-0 top-16 bottom-0 w-64 glass-nav border-r border-white/5 flex-col p-6 z-40">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-4 pl-3">NAVIGATION</div>
<nav class="flex flex-col gap-2">
<a class="flex items-center gap-3 px-4 py-3 rounded-lg bg-white/10 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-title-sm text-sm">Focus</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:text-primary hover:bg-white/5 transition-colors" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-title-sm text-sm">Signal</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:text-primary hover:bg-white/5 transition-colors" href="#">
<span class="material-symbols-outlined">notifications</span>
<span class="font-title-sm text-sm">Markets</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:text-primary hover:bg-white/5 transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-title-sm text-sm">Vault</span>
</a>
</nav>
</aside>
</body></html>
